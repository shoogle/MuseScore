name: Deploy

# Set-up prior to first run:
# 1. Create 'production' environment: https://github.com/musescore/MuseScore/settings/environments
# 2. Enable 'required reviewers': MuseScore Editor Team

on:
  workflow_dispatch:
    inputs:
      platforms:
        description: 'Platforms to build:'
        default: 'backend linux_arm32 linux_arm64 linux_x64 macos windows_x64 windows_portable'
        required: true
      mode:
        description: 'Mode: testing (for alpha, beta, rc), stable'
        default: 'testing'
        required: true
      create_tag:
        description: 'Create tag: on (tag named from version.cmake), off'
        default: 'off'
        required: false

defaults:
  run:
    shell: bash

jobs:

  build:
    name: Build
    uses: ./.github/workflows/build_all.yml
    with:
      platforms: ${{ inputs.platforms }}
      build_mode: ${{ inputs.mode }}
      publish: 'off'
      sentry_project: ${{ inputs.mode == 'stable' && 'mu4' || 'sandbox' }}

  approve_builds:
    name: Approve builds
    needs: build
    runs-on: ubuntu-latest
    environment: # requires approval
    steps:
      - name: No-op
        run: 'echo "No-op"'

  update_learn_playlists:
    name: 'Update Home→Learn playlists'
    needs: approve_builds
    uses: ./.github/workflows/update_learn_playlists.yml
    with:
      mode: ${{ inputs.mode }}
    #environment: production # requires approval
      # url: https://www.youtube.com/playlist?list=PLTYuWi2LmaPEhcwZJwFZqoyQ2xXx_maPa # show on run page


      # create release tag
      # create release page

  # check playlists

  create-draft-release:
    needs: update_learn_playlists
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://github.com
    steps:
      - name: Clone repository
        uses: actions/checkout@v4
      # create release tag
      # create release page

  # check release page and publish, wait for day, if there is no critical issues, then continue

  notify-users:
    needs: create-draft-release
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://github.com
    steps:
      - name: Clone repository
        uses: actions/checkout@v4
